<!-- templates/login.html -->
{% extends "base.html" %}
{% set hide_chrome = true %}

{% block content %}

<section class="min-h-[70vh] flex items-center justify-center px-4 bg-gray-50">

  <div class="w-full max-w-md rounded-2xl shadow-xl bg-white backdrop-blur
              ring-1 ring-black/5 p-6 sm:p-8">

    <!-- Logo + título -->
    <div class="flex flex-col items-center gap-3 mb-6">
      {% if logo_url %}
        <img src="{{ logo_url }}" class="h-14 w-auto" alt="Logo">
      {% endif %}
      <h1 class="text-2xl font-extrabold tracking-tight">
        Incidencias del alumnado
      </h1>
      <p class="text-sm text-gray-600">
        {{ institution_name }}
      </p>
    </div>

    <!-- Error -->
    {% if error %}
      <div class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
        {{ error }}
      </div>
    {% endif %}

    <!-- Formulario -->
    <form method="post" action="/login">

      <input
        type="email"
        name="email"
        value="{{ email or '' }}"
        required
        placeholder="usuario@centro.es"
        class="input mb-3"
      />

      <input
        type="password"
        name="password"
        required
        placeholder="Contraseña"
        class="input mb-4"
      />

      <button type="submit" class="btn-primary w-full">
        Entrar
      </button>
    </form>

    <!-- Primer admin -->
    <p class="mt-4 text-center text-xs text-gray-500">
      Si es el primer acceso:
      <a href="/register-first">
        crear administrador
      </a>
    </p>

  </div>
</section>

{% endblock %}
