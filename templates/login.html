<!-- templates/login.html -->
{% extends "base.html" %}
{% set hide_chrome = true %}

{% block content %}

<section class="min-h-[70vh] flex items-center justify-center px-4
                bg-gradient-to-br from-[#C2A8F9] via-[#C9B6FF] to-[#E6D9FF]">

  <div class="w-full max-w-md rounded-2xl shadow-xl bg-white/95 backdrop-blur
              ring-1 ring-black/5 p-6 sm:p-8">

    <!-- Logo + título -->
    <div class="flex flex-col items-center gap-3 mb-6">
      {% if logo_url %}
        <img src="{{ logo_url }}" class="h-14 w-auto" alt="Logo">
      {% endif %}
      <h1 class="text-2xl font-extrabold tracking-tight text-[#3E2AA3]">
        Incidencias del alumnado
      </h1>
      <p class="text-sm text-slate-600">
        {{ institution_name }}
      </p>
    </div>

    <!-- Error -->
    {% if error %}
      <div class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
        {{ error }}
      </div>
    {% endif %}

    <!-- Formulario -->
    <form method="post" action="/login">

      <input
        type="email"
        name="email"
        value="{{ email or '' }}"
        required
        placeholder="usuario@centro.es"
        class="mb-3 w-full rounded-lg border border-slate-300 bg-slate-50
               px-3 py-2 text-slate-900 outline-none
               focus:border-[#6D5AE6] focus:ring-4 focus:ring-[#6D5AE6]/20"
      >

      <input
        type="password"
        name="password"
        required
        placeholder="Contraseña"
        class="mb-4 w-full rounded-lg border border-slate-300 bg-slate-50
               px-3 py-2 text-slate-900 outline-none
               focus:border-[#6D5AE6] focus:ring-4 focus:ring-[#6D5AE6]/20"
      >

      <button type="submit"
              class="w-full rounded-lg bg-[#4F46E5] px-4 py-2.5
                     font-semibold text-white hover:bg-[#4338CA]">
        Entrar
      </button>
    </form>

    <!-- Primer admin -->
    <p class="mt-4 text-center text-xs text-slate-500">
      Si es el primer acceso:
      <a href="/register-first" class="text-[#4F46E5] underline">
        crear administrador
      </a>
    </p>

  </div>
</section>

{% endblock %}
