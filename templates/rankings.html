<!-- templates/rankings.html -->

{% extends "base.html" %}

{% block content %}

<h1 class="text-xl font-semibold mb-6">🏆 {{ title }}</h1>

<!-- ========================================================= -->
<!-- BOTONES DE TIPO DE RANKING -->
<!-- ========================================================= -->
<div class="flex flex-wrap gap-2 mb-6">

  <a href="/rankings?mode=alumnos{% if gravedad %}&gravedad={{ gravedad }}{% endif %}&from_={{ fecha_desde }}&to={{ fecha_hasta }}"
     class="btn {% if mode == 'alumnos' %}btn-soft{% else %}btn-primary{% endif %}">
    Alumnos
  </a>

  <a href="/rankings?mode=grupos{% if gravedad %}&gravedad={{ gravedad }}{% endif %}&from_={{ fecha_desde }}&to={{ fecha_hasta }}"
     class="btn {% if mode == 'grupos' %}btn-soft{% else %}btn-primary{% endif %}">
    Grupos
  </a>

  <a href="/rankings?mode=profesores{% if gravedad %}&gravedad={{ gravedad }}{% endif %}&from_={{ fecha_desde }}&to={{ fecha_hasta }}"
     class="btn {% if mode == 'profesores' %}btn-soft{% else %}btn-primary{% endif %}">
    Profesores
  </a>

</div>

<!-- ========================================================= -->
<!-- FILTROS (AUTO-SUBMIT, SIN BOTÓN) -->
<!-- ========================================================= -->
<form method="get"
      class="card grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6 text-sm">

  <!-- Mantener el modo -->
  <input type="hidden" name="mode" value="{{ mode }}">

  <!-- Tipo de gravedad -->
  <div>
    <label class="font-semibold">Tipo</label>
    <select name="gravedad" class="form-select w-full auto-submit">
      <option value="">Todos</option>
      <option value="leve" {% if gravedad == "leve" %}selected{% endif %}>Leve</option>
      <option value="grave" {% if gravedad == "grave" %}selected{% endif %}>Grave</option>
      <option value="muy_grave" {% if gravedad == "muy_grave" %}selected{% endif %}>Muy grave</option>
    </select>
  </div>

  <!-- Desde -->
  <div>
    <label class="font-semibold">Desde</label>
    <input type="date"
           name="from_"
           value="{{ fecha_desde }}"
           class="form-input w-full auto-submit">
  </div>

  <!-- Hasta -->
  <div>
    <label class="font-semibold">Hasta</label>
    <input type="date"
           name="to"
           value="{{ fecha_hasta }}"
           class="form-input w-full auto-submit">
  </div>

</form>

<!-- ========================================================= -->
<!-- TABLA DE RANKING -->
<!-- ========================================================= -->
{% if rows %}

<div class="card">
  <table class="table">
    <thead>
      <tr>
        <th>#</th>
        <th>{{ columna }}</th>
        <th>Incidencias</th>
      </tr>
    </thead>
    <tbody>
      {% for r in rows %}
      <tr>
        <td>{{ loop.index }}</td>
        <td>{{ r.nombre }}</td>
        <td><strong>{{ r.total }}</strong></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% else %}

<div class="card text-center text-gray-600">
  No hay datos para los filtros seleccionados.
</div>

{% endif %}

<!-- ========================================================= -->
<!-- AUTO-SUBMIT -->
<!-- ========================================================= -->
<script>
  document.querySelectorAll(".auto-submit").forEach(el => {
    el.addEventListener("change", () => el.form.submit());
  });
</script>

{% endblock %}
